version: '3.8'

services:
  # RabbitMQ with Management Console
  rabbitmq:
    image: rabbitmq:3-management
    container_name: tttn-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password123}
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5

  # Redis for OTP and Brute-force Tracking
  redis:
    image: redis:7-alpine
    container_name: tttn-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-password123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # AI Service (CV Extraction)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tttn-ai-service
    env_file:
      - ./ai-service/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      RABBITMQ_URL: "amqp://${RABBITMQ_USERNAME:-admin}:${RABBITMQ_PASSWORD:-password123}@rabbitmq:5672/"
      RABBITMQ_ENABLED: "true"
    ports:
      - "8001:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

volumes:
  rabbitmq_data:
  redis_data:
  huggingface_cache:
