repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
    -   id: ruff
        args: [ --fix, --config, ai-service/pyproject.toml ]
    -   id: ruff-format
        args: [ --config, ai-service/pyproject.toml ]

-   repo: local
    hooks:
    -   id: spotless-check
        name: Spotless Check (Java)
        entry: cmd.exe /c "cd backend-core && mvnw.cmd spotless:apply"
        language: system
        files: \.java$
        pass_filenames: false

-   repo: local
    hooks:
    -   id: frontend-lint
        name: Frontend Check (ESLint & Prettier)
        entry: cmd.exe /c "cd frontend && npm run lint"
        language: system
        files: \.(js|jsx|ts|tsx)$
        pass_filenames: false

-   repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
    -   id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
